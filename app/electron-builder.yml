appId: org.securedrop.app
productName: securedrop-app
directories:
  buildResources: build
files:
  - out/**
  - resources/**
  - package.json
  - node_modules/**
asarUnpack:
  - resources/**
  - node_modules/better-sqlite3/**
extraResources:
  - from: src/main/database/migrations
    to: migrations
npmRebuild: false
electronFuses:
  runAsNode: false
  # We don't use cookies but if we enable this it's going to prompt for a keychain password
  # enableCookieEncryption: false
  enableNodeCliInspectArguments: false
  enableNodeOptionsEnvironmentVariable: false
  # TODO: once we switch to a custom protocol, we should disable file://
  # grantFileProtocolExtraPrivileges: false
  # We don't use custom V8 snapshots
  # loadBrowserProcessSpecificV8Snapshot: false
  # The asar stuff is only useful on Windows/macOS with codesigning
  # enableEmbeddedAsarIntegrityValidation: false
  # onlyLoadAppFromAsar: false
linux:
  extraResources:
    - from: node_modules/@dbmate/linux-x64/bin/dbmate
      to: bin/dbmate
mac:
  target:
    - dmg
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extraResources:
    - from: node_modules/@dbmate/darwin-arm64/bin/dbmate
      to: bin/dbmate
    - from: ../target/release/securedrop-proxy
      to: bin/securedrop-proxy
    - from: scripts/securedrop-test-key.asc
      to: keys/securedrop-test-key.asc
dmg:
  sign: true
  title: "${productName}-${version}"
