[tool.poetry]
name = "securedrop-export"
version = "0.0.0"
description = "SecureDrop Qubes export scripts"
authors = ["SecureDrop Team"]
license = "GPLv3+"
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.11"
pexpect = "^4.9.0"

[tool.poetry.group.dev.dependencies]
# In production these two are installed using a system package
# so match those versions exactly
pygobject = [
    {version = "=3.42.2", python = ">=3.11"}, # bookworm
]
pycairo = [
    {version = "=1.20.1", python = ">=3.11"}, # bookworm
]

mypy = "^1.13.0"
types-setuptools = "^75.2.0"
pytest = "^8.3.3"
pytest-cov = "^6.0.0"
pytest-mock = "^3.14.0"
semgrep = "^1.95.0"
types-pexpect = "^4.9.0.20240806"

[tool.mypy]
python_version = "3.11"
